<!DOCTYPE html>
<html lang="en">
<head>
    <title>cruds</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="crud">
    <div class="header">
        <h2>cruds</h2>
        <p>product managment system</p>
    </div>
    <div class="inputs">
        <input type="text" placeholder="Title" id="title">
        <div class="price-section">
            <input onkeyup="getTotal()" type="number" placeholder="price" id="price">
            <input onkeyup="getTotal()"type="number" placeholder="Taxes" id="taxes">
            <input onkeyup="getTotal()"type="number" placeholder="Ads" id="ads">
            <input onkeyup="getTotal()"type="number" placeholder="Discount" id="discount">
            <small id="total"></small>
        </div>
        <input type="number" placeholder="count" id="count">
        <input type="text" placeholder="category" id="category">
        <button id="create">Create</button>
        <button id="clear">clear</button>
    </div>
    <div class="outputs">
        <input type="text" placeholder="Search">
        <div class="btn-out">
            <button id="btn-title">Search By Title</button>
            <button id="btn-cate">Search By category</button>
        </div>
    </div>
    <table>
        <tr>
            <th>id</th>
            <th>title</th>
            <th>price</th>
            <th>taxes</th>
            <th>ads</th>
            <th>discount</th>
            <th>category</th>
            <th>total</th>
            <th>update</th>
            <th>delete</th>
        </tr>
        <tbody id="tbody">
            
        </tbody>
    </table>
</div>

    <script src="js/main.js"></script>
</body>
</html>
